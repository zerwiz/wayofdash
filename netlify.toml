# Netlify deploy for the Vite app in ui/
# Repo root should be the folder that contains `ui/` (e.g. “Way of”).
#
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "ui"
  # Bake repo workspace/ + agents/ into static /way-baked/* (same files as local dev API), then build with WAY_BAKED.
  command = "npm ci && node scripts/bake-way-baked.mjs && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  WAY_BAKED = "1"

# Single-page app (React): serve index.html for client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
